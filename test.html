<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste - Koala Sports</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
    .status { padding: 20px; margin: 10px 0; border-radius: 8px; }
    .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    pre { background: #fff; padding: 15px; border-radius: 5px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>🧪 Teste de Carregamento - Koala Sports</h1>
  
  <div id="status"></div>
  <div id="produtos"></div>

  <script>
    const statusDiv = document.getElementById('status');
    const produtosDiv = document.getElementById('produtos');

    async function testarCarregamento() {
      try {
        statusDiv.innerHTML = '<div class="info">⏳ Carregando produtos...</div>';
        
        const response = await fetch('produtos.json');
        
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const data = await response.json();
        
        statusDiv.innerHTML = `
          <div class="success">
            ✅ Produtos carregados com sucesso!<br>
            Total de produtos: ${data.produtos.length}
          </div>
        `;
        
        produtosDiv.innerHTML = `
          <h2>Produtos Encontrados:</h2>
          <pre>${JSON.stringify(data.produtos.slice(0, 3), null, 2)}</pre>
          <p><em>Mostrando apenas os 3 primeiros produtos...</em></p>
        `;
        
      } catch (error) {
        statusDiv.innerHTML = `
          <div class="error">
            ❌ Erro ao carregar produtos:<br>
            ${error.message}<br><br>
            <strong>Possíveis soluções:</strong><br>
            1. Use um servidor web local (não abra o arquivo diretamente)<br>
            2. Python: <code>python -m http.server 8000</code><br>
            3. Node.js: <code>npx http-server</code><br>
            4. VS Code: Instale a extensão "Live Server"
          </div>
        `;
        console.error('Erro completo:', error);
      }
    }

    // Testa ao carregar a página
    testarCarregamento();
  </script>
</body>
</html>
